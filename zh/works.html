<style>
/* ═══════════════════════════════════════════════════════
   Yproject.ai — 레퍼런스 페이지
   메인 페이지(index.html)와 동일한 디자인 토큰 사용
   ═══════════════════════════════════════════════════════ */

:root {
  --bg:          #07070A;
  --bg-elev:     #0E0F14;
  --bg-card:     #12141B;

  --ink:         #F4F4F6;
  --ink-soft:    #A8ADBA;
  --ink-mute:    #5A6070;
  --line:        #1E2130;
  --line-soft:   #15171F;

  --g1:          #7C5CFF;
  --g2:          #3DE2F0;
  --g3:          #FF5AD9;
  --accent:      #7C5CFF;

  --grad-primary: linear-gradient(120deg, var(--g1) 0%, var(--g2) 60%, var(--g3) 100%);

  --maxw: 1360px;
  --gutter: clamp(20px, 4vw, 56px);

  --sans: "Archivo", "Pretendard Variable", Pretendard, -apple-system, "Segoe UI", sans-serif;
  --kor:  "Pretendard Variable", Pretendard, "Archivo", -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--kor);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  position: relative;
  min-height: 100vh;
}

/* 배경 그리드 효과 (메인과 동일) */
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
}

.container {
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 var(--gutter);
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════════
   최상단 STATUS BAR (메인 페이지와 동일)
   ═══════════════════════════════════════════════════════ */
.statusbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px var(--gutter);
  border-bottom: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: .1em;
}
.statusbar .pulse {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--ink-soft);
}
.statusbar .pulse::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%;
  background: #3DE2F0;
  box-shadow: 0 0 10px #3DE2F0;
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(.8); }
}

/* ═══════════════════════════════════════════════════════
   상단 네비게이션 (메인 페이지와 동일)
   ═══════════════════════════════════════════════════════ */
.topnav {
  position: sticky;
  top: 0;
  height: 64px;
  background: rgba(7,7,10,.7);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  z-index: 100;
  border-bottom: 1px solid transparent;
  transition: border-color .2s, background .2s;
}
.topnav.scrolled {
  border-bottom-color: var(--line);
  background: rgba(7,7,10,.85);
}
.topnav .container {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-link {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  transition: opacity .2s;
}
.logo-link:hover { opacity: .8; }
.nav-logo-svg {
  display: block;
  height: 22px;
  width: auto;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.nav-works-link:hover {
  color: var(--ink) !important;
}

/* ═══════════════════════════════════════════════════════
   페이지 헤더
   ═══════════════════════════════════════════════════════ */
.works-header {
  padding: 50px 0 20px;
  text-align: left;
}
.works-header .page-label {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  color: var(--ink-mute);
  margin: 0 0 14px;
}
.works-header .works-title {
  font-family: var(--kor);
  font-size: clamp(28px, 3.4vw, 38px);
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 0 0 16px;
}
.section-head:not(:first-child) {
  margin-top: 56px;
}
.section-head .section-name {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.16em;
  color: var(--ink);
  white-space: nowrap;
}
.section-head .section-line {
  flex: 1;
  height: 1px;
  background: #3A3F52;
}
@media (max-width: 640px) {
  .works-header { padding: 110px 0 36px; }
  .section-head { gap: 12px; margin-bottom: 12px; }
  .section-head:not(:first-child) { margin-top: 40px; }
  .section-head .section-name { font-size: 13px; }
}

/* ═══════════════════════════════════════════════════════
   갤러리 영역 (1열)
   - 폼은 fixed bottom으로 화면 하단에 떠 있음
   ═══════════════════════════════════════════════════════ */
.works-main {
  padding-bottom: 220px;  /* 하단 fixed 폼이 마지막 콘텐츠 가리지 않도록 충분한 여백 */
}

/* 이미지 그리드 (3:4 비율 × 5열) */
.works-grid-img {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 12px;
}

/* 영상 그리드 (9:16 비율 × 5열) */
.works-grid-video {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

@media (max-width: 900px) {
  .works-grid-img,
  .works-grid-video { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}
@media (max-width: 560px) {
  .works-grid-img,
  .works-grid-video { grid-template-columns: repeat(2, 1fr); gap: 6px; }
}

/* 카드 공통 */
.work-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--line);
  cursor: zoom-in;
  transition: transform .3s, border-color .3s;
}
.work-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 24px rgba(255,255,255,.35), 0 0 40px rgba(124,92,255,.25);
  border-color: rgba(255,255,255,.45);
}
.work-card > img,
.work-card > video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.work-card.ratio-3-4 { aspect-ratio: 3/4; }
.work-card.ratio-9-16 { aspect-ratio: 9/16; }

/* ═══════════════════════════════════════════════════════
   제작문의 폼 — 화면 하단 중앙 Floating Bar
   상단: 제목 + 구분선
   하단: 좌측 input 2개 세로 stack + 우측 큰 버튼
   ═══════════════════════════════════════════════════════ */

/* 폼 뒤 딤 오버레이: 폼이 잘 보이도록 페이지 하단을 어둡게
   ※ 강도 40%: 이전(0.85/0.6/0.2)의 약 40% = (0.34/0.24/0.08) */
.form-dim-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 240px;
  background: linear-gradient(to top,
    rgba(0, 0, 0, 0.42) 0%,
    rgba(0, 0, 0, 0.30) 40%,
    rgba(0, 0, 0, 0.10) 75%,
    transparent 100%);
  z-index: 49;
  pointer-events: none;
}

.contact-form-bar {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  width: calc(100vw - 48px);
  max-width: 480px;
  /* 글래스 딤: 더 어둡고 더 흐릿하게 — 폼이 콘텐츠 위에 명확히 떠보임 */
  background: rgba(10, 10, 14, 0.65);
  backdrop-filter: saturate(140%) blur(24px);
  -webkit-backdrop-filter: saturate(140%) blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  padding: 18px 22px 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* 상단: 제목 + 그라디언트 구분선 (문의하기 버튼과 동일 컬러) */
.form-title-wrap {
  padding-bottom: 14px;
  border-bottom: 1px solid transparent;
  border-image: var(--grad-primary) 1;
}
.form-title-wrap h3 {
  font-family: var(--kor);
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  margin: 0;
  letter-spacing: -0.01em;
}

/* 하단 본문: 좌측 fields + 우측 버튼 */
.contact-form-bar form {
  display: flex;
  align-items: stretch;  /* 버튼이 좌측 stack 높이만큼 늘어남 */
  gap: 14px;
}

/* 좌측: 입력 필드 2개 세로 stack */
.form-fields-stack {
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
}
.form-group-h {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.form-group-h label {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding-left: 4px;
}
.form-group-h input,
.form-group-h .phone-wrap {
  height: 40px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--kor);
  font-size: 13px;
  padding: 0 12px;
  width: 100%;
  transition: border-color .2s;
}
.form-group-h input:focus {
  outline: none;
  border-color: var(--accent);
}
.form-group-h input::placeholder {
  color: var(--ink-mute);
}
/* 010- 고정 prefix + 입력칸 (공백 없이 붙어서) */
.form-group-h .phone-wrap {
  display: flex;
  align-items: center;
  padding: 0 12px;
  overflow: hidden;
}
.form-group-h .phone-prefix {
  flex: 0 0 auto;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-soft);
  letter-spacing: 0;
}
.form-group-h .phone-input {
  flex: 1 1 auto;
  height: 100%;
  width: 100%;
  background: transparent;
  border: none;
  color: var(--ink);
  font-family: var(--kor);
  font-size: 13px;
  padding: 0;
}
.form-group-h .phone-input:focus { outline: none; }
.form-group-h .phone-wrap:focus-within { border-color: var(--accent); }

/* 우측: "문의하기" 버튼 — 가로 140px, 세로는 첫 입력 박스 상단부터 ~ 마지막 입력 박스 하단까지 */
.form-submit {
  flex: 0 0 auto;
  width: 140px;
  align-self: stretch;
  /* 라벨 영역(13px 폰트 × line-height 1.5 + 4px gap ≈ 24px)만큼 상단 띄움 */
  margin-top: 24px;
  background: var(--grad-primary);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: var(--kor);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: transform .2s, filter .2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
}
.form-submit:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
}
.form-submit:active {
  transform: translateY(0);
}

/* ─── 비활성 상태: 전화번호/브랜드명 미완성 시 ─────────────────────────
   그라디언트 배경 유지하되 투명도만 낮춤 + 클릭 차단 */
.form-submit.is-disabled {
  opacity: 0.5;
  pointer-events: none;
  cursor: not-allowed;
  filter: none !important;
  transform: none !important;
}

/* 반응형 */
/* 폼 반응형 - 박스 전체를 한 묶음으로 15% 축소 (2026-04-30, index.html과 동일)
   원리: transform: scale(0.85) 사용 → 박스 자체 + 내부 요소 모두 비례 축소 */
@media (max-width: 720px) {
  .contact-form-bar {
    bottom: 16px;
    width: calc(100vw - 24px);
    padding: 16px 18px;
    transform: translateX(-50%) scale(0.85);
    transform-origin: bottom center;
  }
  .contact-form-bar.hidden {
    transform: translateX(-50%) translateY(20px) scale(0.85);
  }
  .form-title-wrap h3 { font-size: 14px; }
  .form-submit { width: 110px; font-size: 13px; }
}
@media (max-width: 480px) {
  .contact-form-bar form {
    flex-direction: column;
    align-items: stretch;
  }
  .form-submit {
    width: 100%;
    height: 46px;
    align-self: auto;
  }
}

/* ═══════════════════════════════════════════════════════
   Lightbox (이미지/영상 클릭 시 풀스크린 확대)
   ═══════════════════════════════════════════════════════ */
#lightbox-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: opacity .3s, visibility .3s;
  padding: 40px;
}
#lightbox-overlay.active { opacity: 1; visibility: visible; }
.lightbox-content {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.lightbox-close {
  position: absolute; top: 24px; right: 24px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.lightbox-close:hover { background: rgba(255,255,255,.2); }

/* ── Footer (메인 페이지와 동일) ── */
footer {
  padding: 36px 0 32px;
  background: var(--bg);
  color: var(--ink-mute);
  border-top: 1px solid var(--line);
  font-family: var(--mono); font-size: 11px;
  text-transform: uppercase; letter-spacing: .08em;
  margin-top: 60px;
}
footer .inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }

/* Footer 언어 토글 */
.lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.lang-toggle a {
  color: var(--ink-mute);
  text-decoration: none;
  font-weight: 400;
  transition: color .2s ease;
}
.lang-toggle a:hover {
  color: var(--ink-soft);
}
.lang-toggle a.active {
  color: var(--ink);
  font-weight: 600;
  cursor: default;
  pointer-events: none;
}
.lang-toggle .sep {
  color: var(--ink-mute);
  opacity: .5;
  user-select: none;
}
</style>

<!-- ═══════════════════ 语言自动检测 + 用户选择记忆 ═══════════════════ -->
<script>
(function() {
  var CURRENT_LANG = 'zh';
  var userChoice = null;
  try { userChoice = localStorage.getItem('yp_lang'); } catch(e) {}

  if (userChoice === CURRENT_LANG) return;

  if (userChoice && userChoice !== CURRENT_LANG) {
    if (userChoice === 'kr') { location.replace('../works.html'); return; }
  }

  var browserLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  if (browserLang.indexOf('zh') === 0) {
    return;
  }
  location.replace('../works.html');
})();

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.lang-toggle a[data-lang]').forEach(function(link) {
    link.addEventListener('click', function() {
      try { localStorage.setItem('yp_lang', link.getAttribute('data-lang')); } catch(e) {}
    });
  });
});
</script>
</head>

<aside class="contact-form-bar">
  <div class="form-title-wrap">
    <h3>时尚 AI 内容制作咨询</h3>
  </div>
  <form id="quickContactForm" onsubmit="return handleQuickContact(event)">
    <div class="form-fields-stack">
      <div class="form-group-h">
        <label for="brandName">品牌名称</label>
        <input type="text" id="brandName" name="brandName" placeholder="YPROJECT" required />
      </div>
      <div class="form-group-h">
        <label for="phone">微信号</label>
        <input type="text" id="phone" name="wechat" placeholder="微信号 / 手机号" required />
      </div>
    </div>
    <button type="submit" class="form-submit">立即咨询</button>
  </form>
</aside>

<script>
// ═══════════════════ 상단 nav 스크롤 효과 ═══════════════════
const topnav = document.querySelector('.topnav');
window.addEventListener('scroll', () => {
  if (window.scrollY > 20) topnav.classList.add('scrolled');
  else topnav.classList.remove('scrolled');
}, { passive: true });

// ═══════════════════ 전화번호 자동 하이픈 + 버튼 활성화 제어 ═══════════════════
// 원리:
// 1) 사용자가 input에 입력 → 숫자만 추출 → 4자리 후 자동 '-' 삽입
//    (CN 버전) 위챗 ID 자유 입력
// 1) 자동 하이픈 없음 — 영문/숫자/한자 자유 형식 허용
// 2) 비어있지 않을 때 + 브랜드명도 입력 시 버튼 활성화
// 3) 비활성 시: pointer-events 차단 + opacity 0.5 (그라디언트 유지)
const phoneInput = document.getElementById('phone');
const brandInput = document.getElementById('brandName');
const quickSubmitBtn = document.querySelector('#quickContactForm .form-submit');

function updateQuickSubmitState() {
  const contactValid = phoneInput.value.trim().length > 0;
  const brandValid = brandInput.value.trim().length > 0;
  const isValid = contactValid && brandValid;
  quickSubmitBtn.classList.toggle('is-disabled', !isValid);
}

phoneInput.addEventListener('input', updateQuickSubmitState);
brandInput.addEventListener('input', updateQuickSubmitState);
updateQuickSubmitState(); // 초기 상태: 비활성

// ═══════════════════ 제작문의 폼 제출 (Google Apps Script로 전송) ═══════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw5vYHnYn10FTpzw6bnYWdNq_LBfgHw1RnLrJdjHNHKe3OAFRIj7PtsuhvNIGP_9WjE/exec';

async function handleQuickContact(e) {
  e.preventDefault();
  const submitBtn = e.target.querySelector('.form-submit');
  const originalText = submitBtn.textContent;
  
  const brand = document.getElementById('brandName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  
  // 버튼 상태: 전송 중
  submitBtn.disabled = true;
  submitBtn.textContent = '发送中...';
  
  try {
    // Apps Script로 데이터 전송
    // ※ 'no-cors' 모드: Apps Script CORS 제약 우회 (가장 일반적인 방식)
    //   응답을 읽을 수는 없지만, 데이터는 정상 전송됨
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        brand: brand,
        phone: phone,
        formType: '레퍼런스 - 빠른 문의 (CN)'
      })
    });
    
    // 성공 처리
    submitBtn.textContent = '✓ 已收到您的咨询';
    submitBtn.style.background = 'linear-gradient(120deg, #7c5cff 0%, #3de2f0 60%, #ff5ad6 120%)';
    
    // 폼 초기화
    document.getElementById('brandName').value = '';
    document.getElementById('phone').value = '';
    
    // 3초 후 버튼 원상복구
    setTimeout(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
      submitBtn.style.background = '';
    }, 3000);
    
  } catch (error) {
    submitBtn.textContent = '⚠ 发送失败 - 请重试';
    submitBtn.disabled = false;
    console.error('폼 전송 실패:', error);
    
    setTimeout(() => {
      submitBtn.textContent = originalText;
    }, 3000);
  }
  
  return false;
}

// ═══════════════════ Lightbox (이미지/영상 클릭 → 풀스크린) ═══════════════════
(function() {
  const overlay = document.createElement('div');
  overlay.id = 'lightbox-overlay';
  overlay.innerHTML = '<button class="lightbox-close" aria-label="关闭">×</button><div class="lightbox-content-wrap"></div>';
  document.body.appendChild(overlay);

  const contentWrap = overlay.querySelector('.lightbox-content-wrap');
  const closeBtn = overlay.querySelector('.lightbox-close');

  function openLightbox(type, src, alt) {
    contentWrap.innerHTML = '';
    let el;
    if (type === 'video') {
      el = document.createElement('video');
      el.src = src;
      el.autoplay = true;
      el.loop = true;
      el.controls = true;
      el.playsInline = true;
    } else {
      el = document.createElement('img');
      el.src = src;
      el.alt = alt || '';
    }
    el.className = 'lightbox-content';
    contentWrap.appendChild(el);
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    contentWrap.innerHTML = '';
  }
  closeBtn.addEventListener('click', closeLightbox);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('active')) closeLightbox();
  });

  document.querySelectorAll('.work-card').forEach(card => {
    card.addEventListener('click', () => {
      const img = card.querySelector('img');
      const video = card.querySelector('video');
      if (img) openLightbox('img', img.src, img.alt);
      else if (video) openLightbox('video', video.src, '');
    });
  });
})();
</script>
